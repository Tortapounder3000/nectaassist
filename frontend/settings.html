<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NECTA Assist - Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center;
      background: url('images/background.jpg') no-repeat center/cover;
      font-family: 'Segoe UI', sans-serif; 
      color: white;
      position: relative;
    }

    body::before { 
      content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 0; 
    }
    
    .glass-card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.1); 
      backdrop-filter: blur(25px);
      padding: 40px; 
      border-radius: 24px; 
      border: 1px solid rgba(255, 255, 255, 0.2);
      width: 90%; 
      max-width: 420px; 
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 { margin-bottom: 10px; font-size: 24px; }
    
    .user-info {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 25px;
      font-size: 14px;
    }

    label { display: block; text-align: left; font-size: 13px; margin-bottom: 5px; opacity: 0.8; }

    input {
      width: 100%; 
      padding: 12px; 
      margin-bottom: 15px; 
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2); 
      background: rgba(0,0,0,0.2); 
      color: white;
      outline: none;
    }

    button {
      width: 100%; 
      padding: 12px; 
      border-radius: 10px; 
      border: none;
      background: linear-gradient(135deg, #667eea, #764ba2); 
      color: white; 
      font-weight: bold; 
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { transform: translateY(-2px); opacity: 0.9; }

    .logout-btn {
      background: transparent;
      border: 1px solid #ff4b2b;
      color: #ff4b2b;
      margin-top: 15px;
    }

    .logout-btn:hover {
      background: #ff4b2b;
      color: white;
    }

    .back-link { 
      display: inline-block; 
      margin-top: 20px; 
      color: rgba(255,255,255,0.5); 
      text-decoration: none; 
      font-size: 14px; 
      transition: 0.3s;
    }
    .back-link:hover { color: white; }
  </style>
</head>
<body>

  <div class="glass-card">
    <h1>Settings</h1>
    
    <div class="user-info">
      Logged in as: <b id="displayUsername">...</b>
    </div>
    
    <form id="passwordForm" onsubmit="changePass(event)">
      <div style="text-align: left;">
        <label>Update Password</label>
        <input type="password" id="newPass" placeholder="New password" required>
        <input type="password" id="confirmPass" placeholder="Confirm new password" required>
      </div>
      <button type="submit" id="saveBtn">Save Changes</button>
    </form>
    
    <button onclick="logOut()" class="logout-btn">Sign Out</button>
    
    <a href="home.html" class="back-link">← Return to Home</a>
  </div>

  <script>
    const currentName = sessionStorage.getItem("loggedInUser");
    const currentId = sessionStorage.getItem("userId");

    // Boot back to login if session is empty
    if (!currentName) window.location.href = "login.html";
    
    document.getElementById("displayUsername").textContent = currentName;

    async function changePass(e) {
      e.preventDefault();
      const pass = document.getElementById("newPass").value;
      const confirm = document.getElementById("confirmPass").value;

      if (pass !== confirm) {
        alert("Passwords don't match, check again.");
        return;
      }

      const btn = document.getElementById("saveBtn");
      btn.textContent = "Updating...";
      btn.disabled = true;

      try {
        const res = await fetch('http://localhost:3000/api/auth/update-password', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: currentId, newPassword: pass })
        });

        const data = await res.json();
        
        if (data.success) {
          alert("Success! Your password has been updated.");
          window.location.href = "home.html";
        } else {
          alert("Error: " + data.error);
        }
      } catch (err) {
        alert("Server error. Try again later.");
      } finally {
        btn.textContent = "Save Changes";
        btn.disabled = false;
      }
    }

    function logOut() {
      if(confirm("Are you sure you want to sign out?")) {
        sessionStorage.clear();
        window.location.href = "login.html";
      }
    }
  </script>
</body>
</html>
