<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NECTA Assist - Grades Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root{
      --glass-bg: rgba(255,255,255,0.10);
      --glass-border: rgba(255,255,255,0.22);
      --accent-1: #667eea;
      --accent-2: #764ba2;
      --muted: rgba(255,255,255,0.75);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      min-height:100vh;
      font-family:"Segoe UI", Tahoma, Verdana, sans-serif;
      background:url('images/background.jpg') no-repeat center/cover;
      color:#fff;
      padding:36px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }
    body::before{
      content:"";position:fixed;inset:0;background:rgba(0,0,0,0.44);z-index:0;
    }

    .top-bar{
      position:fixed;top:0;left:0;right:0;height:60px;
      background:rgba(0,0,0,0.7);backdrop-filter:blur(15px);
      display:flex;align-items:center;padding:0 20px;z-index:998;
      border-bottom:1px solid rgba(255,255,255,0.1);
    }
    .menu-icon{color:white;font-size:28px;cursor:pointer;margin-right:15px;transition:0.3s;}
    .app-title{color:white;font-size:22px;font-weight:600;}

    .side-menu{
      position:fixed;top:60px;left:-280px;width:280px;height:calc(100vh - 60px);
      background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);transition:0.3s ease;
      z-index:999;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,0.1);
    }
    .side-menu.open{left:0;}
    .menu-links{flex:1;padding:20px 0;overflow-y:auto;}
    .side-menu a{
      color:white;font-size:18px;display:block;padding:15px 25px;text-decoration:none;transition:0.3s;
      border-left:3px solid transparent;
    }
    .side-menu a:hover{background:rgba(255,255,255,0.1);border-left-color:#667eea;}
    .side-menu a.active{background:rgba(102,126,234,0.2);border-left-color:#667eea;}

    .user-section{
      border-top:1px solid rgba(255,255,255,0.1);padding:20px;display:flex;align-items:center;gap:12px;
      cursor:pointer;transition:0.3s;
    }
    .user-avatar{
      width:40px;height:40px;border-radius:50%;
      background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:white;
    }

    .wrap{position:relative;z-index:1;width:100%;max-width:1200px;margin-top:80px;}
    .top { display: flex; gap: 12px; flex-wrap: wrap; }
    .card{ background:var(--glass-bg); border:1px solid var(--glass-border); padding:14px; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.35); }
    .welcome.card{ min-width:300px; }
    .welcome h1{font-size:32px;margin-bottom:6px;} /* Fixed size */

    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    select,input,button{padding:10px 12px;border-radius:8px;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.12);color:#fff;}
    button{font-weight:700;background:linear-gradient(135deg,var(--accent-1),var(--accent-2));cursor:pointer; border:none;}
    .clear-btn { background: rgba(231, 76, 60, 0.6); }

    .layout{ margin-top:12px; display:grid; grid-template-columns: 1fr 420px; gap:14px; }
    @media(max-width:980px){.layout{grid-template-columns:1fr;}}

    table{width:100%;border-collapse:collapse;font-size:14px;}
    th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,0.06);text-align:left;}
    .chip{padding:4px 10px;border-radius:999px;font-weight:700;font-size:12px;}
    
    .grade-A{background:#9be7a220; color:#9be7a2; border:1px solid #9be7a230;}
    .grade-B{background:#a8d1ff20; color:#a8d1ff; border:1px solid #a8d1ff30;}
    .grade-C{background:#ffd16620; color:#ffd166; border:1px solid #ffd16630;}
    .grade-D{background:#ff9b9b20; color:#ff9b9b; border:1px solid #ff9b9b30;}
    .grade-F{background:#ff6b6b20; color:#ff6b6b; border:1px solid #ff6b6b30;}

    .summary .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,0.04);}
    .progress-line{height:8px;border-radius:8px;background:rgba(255,255,255,0.06);overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);transition:width 0.5s ease;}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:997;display:none;}
    .overlay.active{display:block;}
  </style>
</head>

<body>
  <div class="top-bar">
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
    <div class="app-title">NECTA Assist</div>
  </div>

  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <div id="sideMenu" class="side-menu">
    <div class="menu-links">
      <a href="home.html">HOME</a>
      <a href="dashboard.html" class="active">GRADES</a>
      <a href="assignments.html">ASSIGNMENTS</a>
    </div>
    <div class="user-section" onclick="window.location.href='settings.html'">
      <div class="user-avatar" id="userAvatar">S</div>
      <div class="user-info">
        <div class="user-name" id="userName">Student</div>
        <div class="user-role">Settings</div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="top">
      <div class="welcome card">
        <h1 id="welcomeTitle">Welcome!</h1>
        <div class="muted">NECTA Grade Calculator</div>
      </div>

      <div class="card" style="flex:1; min-width:420px;">
        <div style="font-weight:800; margin-bottom:8px">Manage Subjects</div>
        <div class="controls">
          <select id="courseSelect">
            <option value="">Select Course</option>
            <option value="Arts">Arts</option>
            <option value="Business">Business</option>
            <option value="Science">Science</option>
          </select>
          <select id="subjectSelect"><option value="">Select Subject</option></select>
          <input id="rawMark" placeholder="Mark (0-100)" type="number" />
          <button onclick="addOrUpdateSubject()">Add / Update</button>
          <button id="clearAllBtn" class="clear-btn">Clear All</button>
        </div>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <div style="font-weight:800; margin-bottom:10px">Your Results</div>
        <table id="subjectsTable">
          <thead>
            <tr>
              <th>Subject</th>
              <th>Mark</th>
              <th>Grade</th>
              <th>Points</th>
              <th>Progress</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="card summary">
        <div style="font-weight:800; margin-bottom:10px">Performance Summary</div>
        <div class="row"><span>Average Mark</span><span id="avgMark">-</span></div>
        <div class="row"><span>Total Points (Best 7)</span><span id="totalPoints">-</span></div>
        <div class="row"><span>Division Estimate</span><span id="division">-</span></div>
        <div class="row"><span>Top Subject</span><span id="bestSub">-</span></div>
        
        <div style="margin-top:20px;">
          <canvas id="barChart" height="200"></canvas>
          <canvas id="pieChart" height="200"></canvas>
        </div>
      </div>
    </div>
  </div>

<script>
   const API_BASE = "https://nectaassist.onrender.com/api";

   
  const USER = sessionStorage.getItem("loggedInUser") || "Student";
  const userId = sessionStorage.getItem("userId");


  if (!userId) { window.location.href = "login.html"; }

  document.getElementById("welcomeTitle").textContent = `Welcome ${USER}!`;
  document.getElementById("userName").textContent = USER;
  document.getElementById("userAvatar").textContent = USER.charAt(0).toUpperCase();

  let barChart = null;
  let pieChart = null;

  // 2. NECTA LOGIC 
  function getGrade(m) {
    if (m >= 75) return {g: "A", p: 1};
    if (m >= 65) return {g: "B", p: 2};
    if (m >= 45) return {g: "C", p: 3};
    if (m >= 25) return {g: "D", p: 4};
    return {g: "F", p: 5};
  }

  function getDiv(p, count) {
    if (count < 7) return "Need 7 Subjects";
    if (p <= 17) return "Division I";
    if (p <= 21) return "Division II";
    if (p <= 25) return "Division III";
    if (p <= 33) return "Division IV";
    return "Division 0";
  }

  // 3. UI FUNCTIONS
  function toggleMenu() {
    document.getElementById("sideMenu").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("active");
  }

  const courseSelect = document.getElementById("courseSelect");
  const subjectSelect = document.getElementById("subjectSelect");
  const compSubs = ["Mathematics","Swahili","English","Biology","Geography","History","Civics"];
  const extras = { Arts:[], Business:["Bookkeeping","Commerce"], Science:["Physics","Chemistry"] };

  courseSelect.onchange = () => {
    subjectSelect.innerHTML = '<option value="">Select Subject</option>';
    if(!courseSelect.value) return;
    [...compSubs, ...extras[courseSelect.value]].forEach(s => {
      subjectSelect.add(new Option(s, s));
    });
  };

  // 4. CORE FUNCTIONALITY (Now using MySQL via Fetch)
  async function renderAll() {
    try {
      const res = await fetch(`${API_BASE}/grades/${userId}`);
      const result = await res.json();
      
      const tbody = document.querySelector("#subjectsTable tbody");
      tbody.innerHTML = "";

      if (!result.success || !result.data || result.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px;">No subjects added.</td></tr>';
        updateSummary([]);
        return;
      }

      // Map DB columns to local logic names
      const list = result.data.map(item => ({ name: item.subject_name, raw: item.mark }));

      list.forEach((s) => {
        const resGrade = getGrade(s.raw);
        tbody.innerHTML += `
          <tr>
            <td>${s.name}</td>
            <td>${s.raw}%</td>
            <td><span class="chip grade-${resGrade.g}">${resGrade.g}</span></td>
            <td>${resGrade.p}</td>
            <td><div class="progress-line"><div class="progress-fill" style="width:${s.raw}%"></div></div></td>
            <td><small>Auto-Saved</small></td>
          </tr>`;
      });
      updateSummary(list);
    } catch (err) {
      console.error("Failed to load grades:", err);
    }
  }

  function updateSummary(list) {
    if (list.length === 0) {
      ["avgMark","totalPoints","division","bestSub"].forEach(id => document.getElementById(id).textContent = "-");
      if(barChart) barChart.destroy();
      if(pieChart) pieChart.destroy();
      return;
    }

    const avg = Math.round(list.reduce((a, b) => a + Number(b.raw), 0) / list.length);
    const sortedPoints = list.map(s => getGrade(s.raw).p).sort((a,b) => a - b);
    const best7 = sortedPoints.slice(0, 7).reduce((a, b) => a + b, 0);
    
    document.getElementById("avgMark").textContent = avg + "%";
    document.getElementById("totalPoints").textContent = best7;
    document.getElementById("division").textContent = getDiv(best7, list.length);
    document.getElementById("bestSub").textContent = list.sort((a,b) => b.raw - a.raw)[0].name;

    updateCharts(list);
  }

  function updateCharts(list) {
    const ctxB = document.getElementById("barChart").getContext("2d");
    const ctxP = document.getElementById("pieChart").getContext("2d");
    if(barChart) barChart.destroy();
    if(pieChart) pieChart.destroy();

    barChart = new Chart(ctxB, {
      type: 'bar',
      data: {
        labels: list.map(s => s.name),
        datasets: [{ label: 'Marks', data: list.map(s => s.raw), backgroundColor: '#667eea' }]
      },
      options: { plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100 } } }
    });

    const grades = {A:0, B:0, C:0, D:0, F:0};
    list.forEach(s => grades[getGrade(s.raw).g]++);

    pieChart = new Chart(ctxP, {
      type: 'pie',
      data: {
        labels: ['A','B','C','D','F'],
        datasets: [{ data: Object.values(grades), backgroundColor: ['#9be7a2','#a8d1ff','#ffd166','#ff9b9b','#ff6b6b'] }]
      }
    });
  }

  async function addOrUpdateSubject() {
    const name = subjectSelect.value;
    const raw = Number(document.getElementById("rawMark").value);
    if(!name || isNaN(raw) || raw < 0 || raw > 100) return alert("Select subject and valid mark!");

    try {
      const response = await fetch(`${API_BASE}/grades/save`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, subject_name: name, mark: raw })
      });
      
      if (response.ok) {
        renderAll(); // Refresh table from DB
        document.getElementById("rawMark").value = ""; // Clear input
      }
    } catch (err) {
      alert("Error saving to database.");
    }
  }

  document.getElementById("clearAllBtn").onclick = async () => {
    if(!confirm("Are you sure? This deletes ALL grades from the database!")) return;
    try {
      await fetch(`${API_BASE}/grades/clear/${userId}`, { method: 'DELETE' });
      renderAll();
    } catch (err) {
      alert("Error clearing data.");
    }
  };

  // Initial Load
  renderAll();
</script>
</body>
</html>
